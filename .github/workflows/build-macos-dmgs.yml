name: Build macOS DMGs

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'v*'

jobs:
  build-macos-dmgs:
    name: Build macOS DMGs
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU for cross-platform Docker builds
        uses: docker/setup-qemu-action@v4
        with:
          platforms: linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Intel macOS app package in Docker
        run: |
          docker build --build-arg GIT_COMMIT=${{ github.sha }} -t boostnote-legacy .
          docker create --name boostnote-x64 boostnote-legacy
          mkdir -p dist
          docker cp boostnote-x64:/app/dist/Boostnote-darwin-x64 ./dist/Boostnote-darwin-x64
          docker rm boostnote-x64

      - name: Build Apple Silicon macOS app package in Docker
        run: |
          docker build --platform linux/arm64 --build-arg GIT_COMMIT=${{ github.sha }} --build-arg BUILDARCH=arm64 -t boostnote-legacy-arm64 .
          docker create --name boostnote-arm64 boostnote-legacy-arm64
          mkdir -p dist
          docker cp boostnote-arm64:/app/dist/Boostnote-darwin-arm64 ./dist/Boostnote-darwin-arm64
          docker rm boostnote-arm64

      - name: Compute version
        id: version
        run: echo "VERSION=$(node -p \"require('./package.json').version\")" >> $GITHUB_ENV

      - name: Install appdmg
        run: npm install -g appdmg

      - name: Create Intel DMG
        run: |
          cat > dist/appdmg-intel.json <<'EOF'
          {
            "title": "Boostnote",
            "icon": "resources/dmg.icns",
            "background": "resources/boostnote-install.png",
            "icon-size": 80,
            "contents": [
              { "x": 448, "y": 344, "type": "link", "path": "/Applications" },
              { "x": 192, "y": 344, "type": "file", "path": "dist/Boostnote-darwin-x64/Boostnote.app" }
            ]
          }
          EOF
          appdmg dist/appdmg-intel.json dist/Boostnote-${VERSION}-darwin-intel.dmg

      - name: Create Apple Silicon DMG
        run: |
          cat > dist/appdmg-arm64.json <<'EOF'
          {
            "title": "Boostnote",
            "icon": "resources/dmg.icns",
            "background": "resources/boostnote-install.png",
            "icon-size": 80,
            "contents": [
              { "x": 448, "y": 344, "type": "link", "path": "/Applications" },
              { "x": 192, "y": 344, "type": "file", "path": "dist/Boostnote-darwin-arm64/Boostnote.app" }
            ]
          }
          EOF
          appdmg dist/appdmg-arm64.json dist/Boostnote-${VERSION}-darwin-arm64.dmg

      - name: Upload DMG artifacts
        uses: actions/upload-artifact@v4
        with:
          name: boostnote-macos-dmgs
          path: |
            dist/Boostnote-${{ env.VERSION }}-darwin-intel.dmg
            dist/Boostnote-${{ env.VERSION }}-darwin-arm64.dmg
